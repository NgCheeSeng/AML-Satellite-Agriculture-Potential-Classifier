project:
  name: sagil_monthly_gee_environmental_risk
  study_area: Sagil, Tangkak, Johor
  description: Monthly Environmental Anomaly and One-Month-Ahead Flood/Drought Proxy-Risk Forecasting for Agricultural Land in Sagil, Johor.

paths:
  coordinates_csv: data/input/coordinates.csv
  sample_index_csv: data/metadata/sample_index.csv
  extraction_manifest_json: data/metadata/extraction_manifest.json
  raw_monthly_dir: data/raw/monthly
  processed_data_csv: data/processed/processed_data.csv
  artifacts_dir: artifacts
  reports_dir: reports

gee:
  project_id_env: GEE_PROJECT_ID
  credentials_path: config/gee_credentials.json
  first_month: '2021-01-01'
  last_month: '2026-06-01'
  s2_cloud_probability_max: 80
  s2_composite_reducer: median

grid:
  projected_crs: EPSG:32648
  half_width_m: 500
  expected_area_m2: 1000000
  area_tolerance_fraction: 0.05

thresholds:
  dry_day_mm: 1.0
  heavy_rain_day_mm: 20.0
  lowland_elevation_m: 50.0

modeling:
  train_target_end: '2025-05-01'
  test_target_start: '2025-06-01'
  test_target_end: '2026-05-01'
  holdout_target_month: '2026-06-01'
  random_state: 42
  pca_components: 0.95
  mlp_hidden_layer_sizes: [8]
  mlp_max_iter: 500
  random_forest_estimators: 100
  severity_percentiles: [75, 90, 97.5]

huggingface:
  dataset_repo_id: Aki298/AML-Johor-Tangkak-Sagil-GEE-dataset

demo:
  default_history_months: 13
